<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SMART on FHIR - Launching (Public Client + PKCE)</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen overflow-hidden">

    <div class="text-center max-w-md">
        <div class="inline-block relative h-20 w-20 mx-auto">
            <div class="absolute inset-0 border-4 border-indigo-500/20 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-t-indigo-500 rounded-full animate-spin"></div>
        </div>
        
        <h2 class="mt-8 text-2xl font-bold text-white tracking-tight">SMART on FHIR 啟動中</h2>
        <p class="mt-3 text-slate-400 text-sm font-mono">Public Client + PKCE 授權流程</p>
        
        <div class="mt-10 flex justify-center gap-2 flex-wrap">
            <span class="px-3 py-1 bg-emerald-900/70 text-emerald-300 text-xs rounded-xl border border-emerald-700 font-medium">Public Client</span>
            <span class="px-3 py-1 bg-emerald-900/70 text-emerald-300 text-xs rounded-xl border border-emerald-700 font-medium">PKCE</span>
            <span class="px-3 py-1 bg-slate-800 text-slate-400 text-xs rounded-xl border border-slate-700 font-medium">OAuth2</span>
        </div>

        <div id="status-msg" class="mt-6 text-slate-400 text-sm">正在導向授權伺服器...</div>

        <div class="mt-12 text-[10px] text-slate-600 font-mono break-all">
            Client ID: cc344727-6f90-496c-94fd-c7829aa9a51d
        </div>
    </div>

    <script>
        // ==================== 設定 ====================
        const CLIENT_ID = "cc344727-6f90-496c-94fd-c7829aa9a51d";
        
        // 使用絕對路徑，避免 GitHub Pages 跳轉問題
        const REDIRECT_URI = "https://vtr-asia.github.io/FHIR-Smart-Pre-Auth_u/index.html";

        async function startLaunch() {
            const urlParams = new URLSearchParams(window.location.search);
            const iss = urlParams.get("iss");
            const code = urlParams.get("code");
            const statusDiv = document.getElementById("status-msg");

            // 1. 如果已經帶有 code，表示已從授權伺服器回來，不重複發起授權
            if (code) {
                statusDiv.innerHTML = `<span class="text-emerald-400">已取得授權碼，正在返回 index.html 處理...</span>`;
                console.log("✅ 已偵測到授權碼，跳轉至 index.html");
                return;
            }

            // 2. 檢查 iss 參數
            if (!iss) {
                statusDiv.innerHTML = `<span class="text-red-400">錯誤：URL 缺少 iss 參數</span>`;
                alert("錯誤：缺少 iss 參數！\n請確認啟動網址包含 ?iss=FHIR_SERVER_URL");
                return;
            }

            try {
                statusDiv.innerText = "正在導向授權伺服器進行登入...";
                console.log("🚀 發起 SMART on FHIR Launch");
                console.log("ISS:", iss);
                console.log("Redirect URI:", REDIRECT_URI);

                // 3. 使用 Public Client + PKCE 模式授權
                await FHIR.oauth2.authorize({
                    clientId: CLIENT_ID,
                    scope: "patient/*.read user/Patient.read launch openid profile fhirUser",
                    redirectUri: REDIRECT_URI,
                    iss: iss,
                    pkceMode: "ifSupported"   // 推薦設定，讓 library 自動處理 PKCE
                });

            } catch (error) {
                console.error("Launch Error:", error);
                statusDiv.innerHTML = `<span class="text-red-400">啟動失敗: ${error.message || error}</span>`;
                
                // 提供重試按鈕
                const retryBtn = document.createElement("button");
                retryBtn.className = "mt-6 px-6 py-2 bg-indigo-600 text-white rounded-xl text-sm font-medium hover:bg-indigo-700";
                retryBtn.textContent = "重新啟動";
                retryBtn.onclick = () => window.location.reload();
                statusDiv.parentNode.appendChild(retryBtn);
            }
        }

        // 啟動流程
        window.addEventListener("load", startLaunch);
    </script>
</body>
</html>
