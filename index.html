<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FHIR Smart Pre-Auth | 高額特材事審助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .evidence-line { border-left: 2px dashed #e2e8f0; margin-left: 1rem; }
        .status-blink { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto bg-white rounded-3xl p-6 mb-6 shadow-sm flex flex-wrap items-center justify-between border border-blue-100">
        <div class="flex items-center space-x-5">
            <div class="h-14 w-14 bg-gradient-to-br from-red-500 to-pink-600 rounded-2xl flex items-center justify-center shadow-lg">
                <i data-lucide="microscope" class="text-white w-7 h-7"></i>
            </div>
            <div>
                <h1 id="patient-name" class="text-xl font-bold text-slate-800">授權處理中...</h1>
                <p class="text-slate-500 text-xs italic">案件類型：高額標靶藥物事前審查 (Pre-Auth Requested)</p>
            </div>
        </div>
        <div class="flex space-x-3">
            <div class="px-4 py-2 bg-red-50 text-red-600 rounded-xl text-xs font-bold border border-red-100 flex items-center">
                <span class="h-2 w-2 bg-red-600 rounded-full mr-2 status-blink"></span> 高風險核減預警
            </div>
            <button onclick="toggleJsonView()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-700 transition">View FHIR (CL3)</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-12 gap-6">
        <!-- 左側給付規範區塊（保留你原本內容） -->
        <section class="col-span-12 lg:col-span-6">
            <div class="bg-white rounded-3xl p-8 shadow-xl border border-slate-100">
                <h2 class="text-lg font-bold text-slate-800 mb-6 flex items-center italic">
                    <i data-lucide="clipboard-check" class="mr-2 text-indigo-600"></i>給付規範與臨床證據對齊
                </h2>

                <div class="space-y-6">
                    <div class="relative">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest leading-loose">規範 01: 診斷適應症</span>
                            <span class="text-[10px] bg-green-100 text-green-600 px-2 py-0.5 rounded">Match Found</span>
                        </div>
                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                            <p class="text-sm font-semibold text-slate-700">需具有 EGFR 突變之非小細胞肺癌 (NSCLC)</p>
                            <div class="evidence-line mt-3 pl-4">
                                <p class="text-xs text-indigo-600 font-medium">📍 臨床證據 (Condition):</p>
                                <p id="clinical-evidence" class="text-xs text-slate-500 italic mt-1">載入中...</p>
                            </div>
                        </div>
                    </div>

                    <div class="relative">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest leading-loose">規範 02: 基因檢測報告</span>
                            <span class="text-[10px] bg-amber-100 text-amber-600 px-2 py-0.5 rounded font-bold uppercase tracking-tighter">Missing Attachment</span>
                        </div>
                        <div class="p-4 bg-amber-50 rounded-2xl border border-amber-200">
                            <p class="text-sm font-semibold text-amber-900">需附上 6 個月內之基因檢測報告 (EGFR Exon 19)</p>
                            <div class="evidence-line mt-3 pl-4 border-amber-200">
                                <p class="text-xs text-amber-700 font-medium italic">📍 缺件警告 (DiagnosticReport):</p>
                                <p class="text-xs text-amber-600 mt-1">系統未偵測到結構化基因報告。建議點擊「調閱電子病歷」補正。</p>
                                <button class="mt-2 text-[10px] bg-amber-600 text-white px-3 py-1 rounded-lg">自動搜尋 EMR</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-10 border-t pt-6">
                    <button onclick="generatePreAuth()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold flex items-center justify-center space-x-2 shadow-lg active:scale-95 transition">
                        <i data-lucide="send-horizontal"></i>
                        <span>送出事前審查 (FHIR Claim / Pre-Auth)</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- 右側區塊可繼續補充你原本的內容 -->
        <section class="col-span-12 lg:col-span-6 space-y-6">
            <!-- 你原本的事審歷程與預估總額區塊放在這裡 -->
        </section>
    </main>

    <script>
        let smartClient = null;

        async function initializeSMART() {
            const patientNameEl = document.getElementById("patient-name");
            const clinicalEvidenceEl = document.getElementById("clinical-evidence");

            try {
                patientNameEl.textContent = "授權驗證中...";
                console.log("🔄 正在使用授權碼交換 Access Token (Public Client + PKCE)...");

                // 執行 token 交換與 client 初始化
                smartClient = await FHIR.oauth2.ready();

                console.log("✅ SMART Client 初始化成功", smartClient);

                // 讀取病人基本資料
                const patient = await smartClient.patient.read();
                const name = patient.name?.[0] || {};
                const fullName = `${name.given?.join(' ') || ''} ${name.family || ''}`.trim();

                patientNameEl.textContent = fullName || "未知病人";
                console.log("病人資料:", patient);

                // 範例：讀取 Condition（可擴充到 clinical-evidence）
                try {
                    const conditions = await smartClient.patient.request("Condition", { pageLimit: 10 });
                    if (conditions?.length > 0) {
                        clinicalEvidenceEl.textContent = conditions[0].code?.text || "已找到相關診斷";
                    }
                } catch (e) {
                    clinicalEvidenceEl.textContent = "無法讀取臨床證據";
                }

            } catch (error) {
                console.error("❌ SMART ready 失敗:", error);
                patientNameEl.innerHTML = `<span class="text-red-500">授權失敗: ${error.message || error}</span>`;
                
                // 可加入重試按鈕
                const retryBtn = document.createElement("button");
                retryBtn.className = "mt-4 px-5 py-2 bg-red-600 text-white rounded-xl text-sm";
                retryBtn.textContent = "重新啟動授權";
                retryBtn.onclick = () => window.location.href = "launch.html";
                patientNameEl.parentNode.appendChild(retryBtn);
            }
        }

        // 頁面載入後自動執行
        window.addEventListener("load", initializeSMART);

        // 其他你原本的函式（toggleJsonView、generatePreAuth 等）可繼續保留在這裡
        function toggleJsonView() {
            if (smartClient) {
                console.log("Current SMART Client:", smartClient);
                alert("已將 client 資訊輸出至 Console，請按 F12 查看");
            } else {
                alert("SMART Client 尚未初始化");
            }
        }

        function generatePreAuth() {
            alert("事前審查送出功能開發中...");
        }

        // 初始化 Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
