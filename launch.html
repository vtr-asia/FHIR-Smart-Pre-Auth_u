<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Physician-CDSSU - 啟動中...</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "Microsoft JhengHei", system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e0f2fe 100%);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            max-width: 520px;
            padding: 50px 40px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 1.8rem;
            color: #1e40af;
            margin-bottom: 6px;
        }
        .subtitle {
            color: #334155;
            font-weight: 500;
            margin-bottom: 30px;
        }
        .loader {
            border: 8px solid #e2e8f0;
            border-top: 8px solid #3b82f6;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            animation: spin 1.2s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            font-size: 15.5px;
            color: #475569;
            margin-top: 10px;
        }
        .note {
            font-size: 13px;
            color: #64748b;
            margin-top: 40px;
            line-height: 1.5;
        }
        .warning {
            color: #ef4444;
            font-size: 12px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Physician-CDSSU</h1>
        <p class="subtitle">醫師臨床決策支援系統</p>
        
        <p style="color:#1e40af; font-weight:500; margin-bottom: 20px;">
            正在連線至 SMART Health IT 測試伺服器 (R4)
        </p>
        
        <div class="loader"></div>
        
        <p id="status" class="status">初始化 SMART on FHIR Launch...</p>

        <div class="note">
            Client ID: cc344727-6f90-496c-94fd-c7829aa9a51d<br>
            測試環境：SMART Health IT Sandbox
        </div>
        <p class="warning">⚠️ 注意：此版本使用 Confidential Client 設定（純前端示範用）</p>
    </div>

    <script>
        const CLIENT_ID = "cc344727-6f90-496c-94fd-c7829aa9a51d";
        const CLIENT_SECRET = "79f04b56b33491716c0880af72cdef7d3f0629111421cedd18353651cd313d9e";   // ← 已加入

        const REDIRECT_URI = new URL("index.html", window.location.href).href;

        async function startLaunch() {
            const urlParams = new URLSearchParams(window.location.search);
            const iss = urlParams.get("iss");
            const launchParam = urlParams.get("launch");
            const statusEl = document.getElementById("status");

            if (urlParams.get("code")) {
                statusEl.innerHTML = "✅ 授權成功，正在跳轉至醫師儀表板...";
                window.location.replace(REDIRECT_URI + "?" + urlParams.toString());
                return;
            }

            if (!iss) {
                statusEl.innerHTML = `<span style="color:#ef4444;">錯誤：缺少 iss 參數</span>`;
                return;
            }

            try {
                statusEl.textContent = "正在導向授權頁面...";

                console.log("🚀 SMART Launch 開始");
                console.log("ISS:", iss);
                console.log("Launch 參數:", launchParam);
                console.log("Redirect URI:", REDIRECT_URI);
                console.log("Client ID:", CLIENT_ID);

                await FHIR.oauth2.authorize({
                    clientId: CLIENT_ID,
                    clientSecret: CLIENT_SECRET,        // ← 已加入 client_secret
                    scope: "launch patient/*.read user/Patient.read openid profile fhirUser online_access",
                    redirectUri: REDIRECT_URI,
                    iss: iss,
                    launch: launchParam,
                    pkceMode: "ifSupported",
                    completeInTarget: true
                });

            } catch (error) {
                console.error("Launch 錯誤:", error);
                statusEl.innerHTML = `
                    <span style="color:#ef4444;">
                        Launch 失敗<br><br>
                        ${error.message || error}<br><br>
                        請按 F12 查看 Console 詳細錯誤
                    </span>`;
            }
        }

        window.addEventListener("load", startLaunch);
    </script>
</body>
</html>
